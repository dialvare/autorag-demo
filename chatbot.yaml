---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: "llama-stack-demo-chatbot"
  annotations:
    app.openshift.io/connects-to: '[{"apiVersion":"v1","kind":"Service","name":"llamastack-custom-distribution-service"}]'
  labels:
    app: "llama-stack-demo-chatbot"
    app.kubernetes.io/component: "llama-stack-demo-chatbot"
    app.kubernetes.io/instance: "llama-stack-demo-chatbot"
    app.kubernetes.io/name: "llama-stack-demo-chatbot"
    app.kubernetes.io/part-of: "llama-stack-demo"
    app.openshift.io/runtime: "python"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "llama-stack-demo-chatbot"
  template:
    metadata:
      labels:
        app: "llama-stack-demo-chatbot"
      annotations:
        instrumentation.opentelemetry.io/inject-python: "llama-stack-demo-instrumentation"
    spec:
      containers:
        - name: "llama-stack-demo-chatbot"
          image: quay.io/dgarciap/chatbot:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8501
              protocol: TCP
              name: 8501-tcp
          resources:
            limits:
              cpu: '1'
              memory: 4Gi
            requests:
              cpu: 250m
              memory: 500Mi
          env:
            - name: STREAMLIT_SERVER_FILE_WATCHER_TYPE
              value: 'none'
            - name: STREAMLIT_SERVER_HEADLESS
              value: 'true'
            - name: OTEL_SERVICE_NAME
              value: "llama-stack-demo-chatbot"
            - name: TELEMETRY_SINKS
              value: otel_trace
            - name: MCP_SERVER_URL
              value: "http://openshift-mcp-deployment.llamastack.svc.cluster.local:8080/mcp"
            - name: MCP_SERVER_LABEL
              value: "openshift-mcp-server"
          envFrom:
            - configMapRef:
                name: llama-stack-demo-config
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: "llama-stack-demo-chatbot"
  labels:
    app: "llama-stack-demo-chatbot"
    app.kubernetes.io/component: "llama-stack-demo-chatbot"
    app.kubernetes.io/instance: "llama-stack-demo-chatbot"
    app.kubernetes.io/name: "llama-stack-demo-chatbot"
    app.kubernetes.io/part-of: "llama-stack-demo"
    app.openshift.io/runtime: "python"
spec:
  selector:
    app: "llama-stack-demo-chatbot"
  ports:
    - name: 8501-tcp
      port: 8501
      targetPort: 8501
      protocol: TCP
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: "llama-stack-demo-chatbot"
  annotations:
    haproxy.router.openshift.io/timeout: 300s
spec:
  port:
    targetPort: 8501-tcp
  tls:
    insecureEdgeTerminationPolicy: Redirect
    termination: edge
  to:
    kind: Service
    name: "llama-stack-demo-chatbot"
    weight: 100
  wildcardPolicy: None
