---
# ServiceAccount used by the OpenShift MCP server deployment.
# Safe to apply if it already exists.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-viewer
  namespace: llamastack
  labels:
    app.kubernetes.io/part-of: openshift-mcp-server
---
# Grant cluster-wide read access required by openshift-mcp-server tools such as
# nodes_list, nodes_top, events_list (all namespaces), and metrics APIs.
#
# The default MCP catalog binding uses the "view" ClusterRole, which is
# namespace-scoped and cannot list nodes at cluster scope.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mcp-viewer-binding
  labels:
    app.kubernetes.io/part-of: openshift-mcp-server
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-reader
subjects:
  - kind: ServiceAccount
    name: mcp-viewer
    namespace: llamastack
