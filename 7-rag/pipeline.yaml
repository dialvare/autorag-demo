deploymentSpec:
  executors:
    exec-register-vector-store-and-files:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - register_vector_store_and_files
        command:
        - sh
        - -c
        - |
          if ! [ -x "$(command -v pip)" ]; then
              python3 -m ensurepip || python3 -m ensurepip --user || apt-get install python3-pip
          fi
          PIP_DISABLE_PIP_VERSION_CHECK=1 python3 -m pip install --quiet --no-warn-script-location 'llama-stack-client==0.7.1' 'fire' 'requests' && python3 -m pip install --quiet --no-warn-script-location 'kfp==2.15.2' '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<"3.9"' && "$0" "$@"
        - sh
        - -ec
        - |
          program_path=$(mktemp -d)
          printf "%s" "$0" > "$program_path/ephemeral_component.py"
          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main --component_module_path "$program_path/ephemeral_component.py" "$@"
        - |
          import kfp
          from kfp import dsl
          from kfp.dsl import *
          from typing import *

          def register_vector_store_and_files(
              git_repo: str,
              git_context: str,
              git_ref: str,
              vector_store_name: str,
              vector_store_provider_id: str,
              chunk_size_in_tokens: int,
              chunk_overlap_in_tokens: int,
              embedding_model: str,
              embedding_dimension: int,
              ranker: str,
              filenames: str,
          ):
              import io
              import os
              import requests
              import mimetypes
              from typing import List, Optional
              from llama_stack_client import LlamaStackClient

              mimetypes.add_type("text/markdown", ".md")
              mimetypes.add_type("text/html", ".html")
              mimetypes.add_type("text/plain", ".txt")
              mimetypes.add_type("application/pdf", ".pdf")

              if not vector_store_name or not vector_store_provider_id or not filenames:
                  raise ValueError("Missing mandatory parameters")

              llama_stack_host = os.environ.get("LLAMA_STACK_HOST")
              llama_stack_port = os.environ.get("LLAMA_STACK_PORT")
              llama_stack_secure = os.environ.get("LLAMA_STACK_SECURE", "").lower() in ("true", "1", "yes")

              if not llama_stack_host or not llama_stack_port:
                  raise ValueError("LLAMA_STACK environment variables are not set")

              client = LlamaStackClient(base_url=f"{'https' if llama_stack_secure else 'http'}://{llama_stack_host}:{llama_stack_port}")
              base_raw_url = f"https://raw.githubusercontent.com/{git_repo}/{git_ref}/{git_context}"

              file_ids = []
              for filename in filenames.split(","):
                  source = f"{base_raw_url}/{filename.strip()}"
                  print("Downloading and uploading document:", source)
                  response = requests.get(source)
                  response.raise_for_status()

                  file_content = io.BytesIO(response.content)
                  file_basename = source.split("/")[-1]
                  mime_type = mimetypes.guess_type(file_basename)[0] or "application/pdf"

                  file = client.files.create(
                      file=(file_basename, file_content, mime_type),
                      purpose="assistants",
                  )
                  file_ids.append(file.id)
                  print(f"Successfully uploaded {file_basename} (ID: {file.id})")

              models = client.models.list()
              matching_model = next((m for m in models if m.id == embedding_model), None)

              if not matching_model:
                  available = [m.id for m in models]
                  raise ValueError(f"Model '{embedding_model}' not found. Available: {available}")

              model_type = getattr(matching_model, 'model_type', None) or getattr(matching_model, 'api_model_type', None)
              if not model_type and hasattr(matching_model, 'custom_metadata') and matching_model.custom_metadata:
                  model_type = matching_model.custom_metadata.get("model_type")

              if model_type != "embedding":
                  raise ValueError(f"Model '{embedding_model}' is not an embedding model (type={model_type})")

              embedding_dim = embedding_dimension
              if hasattr(matching_model, 'metadata') and matching_model.metadata:
                  embedding_dim = int(float(matching_model.metadata.get("embedding_dimension", embedding_dimension)))
              elif hasattr(matching_model, 'custom_metadata') and matching_model.custom_metadata:
                  embedding_dim = int(float(matching_model.custom_metadata.get("embedding_dimension", embedding_dimension)))

              client.embeddings.create(model=embedding_model, input="warmup")

              try:
                  vector_store = client.vector_stores.create(
                      name=vector_store_name,
                      file_ids=[],
                      chunking_strategy={
                          "type": "static",
                          "static": {
                              "max_chunk_size_tokens": chunk_size_in_tokens,
                              "chunk_overlap_tokens": chunk_overlap_in_tokens,
                          },
                      },
                      extra_body={
                          "embedding_model": embedding_model,
                          "embedding_dimension": embedding_dim,
                          "provider_id": vector_store_provider_id,
                      }
                  )
                  print(f"Successfully created vector store '{vector_store_name}' with ID: {vector_store.id}")
              except Exception as e:
                  raise Exception(f"ERROR: Failed to create vector store '{vector_store_name}': {str(e)}")

              for file_id in file_ids:
                  client.vector_stores.files.create(
                      vector_store_id=vector_store.id,
                      file_id=file_id,
                  )
        image: quay.io/modh/odh-pipeline-runtime-pytorch-cuda-py312-ubi9@sha256:72ff2381e5cb24d6f549534cb74309ed30e92c1ca80214669adb78ad30c5ae12
        resources:
          accelerator:
            count: '1'
            resourceCount: '1'
            resourceType: nvidia.com/gpu
