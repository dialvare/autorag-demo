pipelineInfo:
  description: Creates a vector store with embeddings from PDF files from a GitHub source.
  name: pipeline
root:
  dag:
    tasks:
      condition-branches-1:
        componentRef:
          name: comp-condition-branches-1
        inputs:
          parameters:
            pipelinechannel--chunk_overlap_in_tokens:
              componentInputParameter: chunk_overlap_in_tokens
            pipelinechannel--chunk_size_in_tokens:
              componentInputParameter: chunk_size_in_tokens
            pipelinechannel--embedding_dimension:
              componentInputParameter: embedding_dimension
            pipelinechannel--embedding_model:
              componentInputParameter: embedding_model
            pipelinechannel--filenames:
              componentInputParameter: filenames
            pipelinechannel--git_context:
              componentInputParameter: git_context
            pipelinechannel--git_ref:
              componentInputParameter: git_ref
            pipelinechannel--git_repo:
              componentInputParameter: git_repo
            pipelinechannel--ranker:
              componentInputParameter: ranker
            pipelinechannel--use_gpu:
              componentInputParameter: use_gpu
            pipelinechannel--vector_store_name:
              componentInputParameter: vector_store_name
            pipelinechannel--vector_store_provider_id:
              componentInputParameter: vector_store_provider_id
        taskInfo:
          name: condition-branches-1
  inputDefinitions:
    parameters:
      chunk_overlap_in_tokens:
        defaultValue: 128.0
        description: Number of overlapping tokens between chunks
        isOptional: true
        parameterType: NUMBER_INTEGER
      chunk_size_in_tokens:
        defaultValue: 2048.0
        description: Maximum number of tokens per chunk
        isOptional: true
        parameterType: NUMBER_INTEGER
      embedding_dimension:
        defaultValue: 768.0
        description: Dimension of the embedding model
        isOptional: true
        parameterType: NUMBER_INTEGER
      embedding_model:
        defaultValue: sentence-transformers/nomic-ai/nomic-embed-text-v1.5
        description: Model ID for embedding generation
        isOptional: true
        parameterType: STRING
      filenames:
        defaultValue: pizza-bank-info.pdf
        description: Comma-separated list of filenames to download and convert
        isOptional: true
        parameterType: STRING
      git_context:
        defaultValue: .
        description: Context of the git repository
        isOptional: true
        parameterType: STRING
      git_ref:
        defaultValue: main
        description: Reference of the git repository
        isOptional: true
        parameterType: STRING
      git_repo:
        defaultValue: dgpmakes/rag-pipeline
        description: GitHub repository URL
        isOptional: true
        parameterType: STRING
      ranker:
        defaultValue: default
        description: Ranker to use for scoring
        isOptional: true
        parameterType: STRING
      use_gpu:
        defaultValue: false
        description: Enable GPU usage for embedding generation
        isOptional: true
        parameterType: BOOLEAN
      vector_store_name:
        defaultValue: pizza-bank-production
        description: Name of the vector store to store embeddings
        isOptional: true
        parameterType: STRING
      vector_store_provider_id:
        defaultValue: milvus-remote
        description: Provider ID of the vector store
        isOptional: true
        parameterType: STRING
