apiVersion: v1
kind: Secret
metadata:
 name: milvus-secret
 namespace: llamastack
type: Opaque
stringData:
 root-password: "redhat123"
 MILVUS_TOKEN: "root-password:redhat123"
 MILVUS_ENDPOINT: "tcp://milvus-service:19530"
 MILVUS_CONSISTENCY_LEVEL: "Bounded"
---
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
 name: milvus-pvc
 namespace: llamastack
spec:
 accessModes:
   - ReadWriteOnce
 resources:
   requests:
     storage: 20Gi
 volumeMode: Filesystem
---
apiVersion: apps/v1
kind: Deployment
metadata:
 name: etcd-deployment
 namespace: llamastack
 labels:
   app: etcd
spec:
 replicas: 1
 selector:
   matchLabels:
     app: etcd
 strategy:
   type: Recreate
 template:
   metadata:
     labels:
       app: etcd
   spec:
     containers:
       - name: etcd
         image: quay.io/coreos/etcd:v3.5.5
         command:
           - etcd
           - --advertise-client-urls=http://127.0.0.1:2379
           - --listen-client-urls=http://0.0.0.0:2379
           - --data-dir=/etcd
         ports:
           - containerPort: 2379
         volumeMounts:
           - name: etcd-data
             mountPath: /etcd
         env:
           - name: ETCD_AUTO_COMPACTION_MODE
             value: revision
           - name: ETCD_AUTO_COMPACTION_RETENTION
             value: "1000"
           - name: ETCD_QUOTA_BACKEND_BYTES
             value: "4294967296"
           - name: ETCD_SNAPSHOT_COUNT
             value: "50000"
     volumes:
       - name: etcd-data
         emptyDir: {}
     restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
 name: etcd-service
 namespace: llamastack
spec:
 ports:
   - port: 2379
     targetPort: 2379
 selector:
   app: etcd
---
apiVersion: apps/v1
kind: Deployment
metadata:
 labels:
   app: milvus-standalone
 name: milvus-standalone
 namespace: llamastack
spec:
 replicas: 1
 selector:
   matchLabels:
     app: milvus-standalone
 strategy:
   type: Recreate
 template:
   metadata:
     labels:
       app: milvus-standalone
   spec:
     containers:
       - name: milvus-standalone
         image: milvusdb/milvus:v2.6.0
         args: ["milvus", "run", "standalone"]
         env:
           - name: DEPLOY_MODE
             value: standalone
           - name: ETCD_ENDPOINTS
             value: etcd-service:2379
           - name: COMMON_STORAGETYPE
             value: local
           - name: MILVUS_ROOT_PASSWORD
             valueFrom:
               secretKeyRef:
                 name: milvus-secret
                 key: root-password
         livenessProbe:
           exec:
             command: ["curl", "-f", "http://localhost:9091/healthz"]
           initialDelaySeconds: 90
           periodSeconds: 30
           timeoutSeconds: 20
           failureThreshold: 5
         ports:
           - containerPort: 19530
             protocol: TCP
           - containerPort: 9091
             protocol: TCP
         volumeMounts:
           - name: milvus-data
             mountPath: /var/lib/milvus
     restartPolicy: Always
     volumes:
       - name: milvus-data
         persistentVolumeClaim:
           claimName: milvus-pvc
---
apiVersion: v1
kind: Service
metadata:
 name: milvus-service
 namespace: llamastack
spec:
 selector:
   app: milvus-standalone
 ports:
   - name: grpc
     port: 19530
     targetPort: 19530
   - name: http
     port: 9091
     targetPort: 9091